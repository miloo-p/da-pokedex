<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokeindex</title>

    <link rel="shortcut icon" href="./assets/icons/pokeball-pokemon-svgrepo-com.svg" type="image/x-icon" />

    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/fonts.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/list.css" />
    <link rel="stylesheet" href="./css/detail.css" />
    <link rel="stylesheet" href="./css/responsive.css" />

    <script src="./js/template.js" defer></script>
    <script src="./js/main.js" defer></script>
  </head>
  <body onload="init()">
    <header class="complete_header">
      <section class="section-content-wrapper utc_flex-dir-row utc_flex-jc-sbetween utc_flex-ai-center">
        <div class="utc_flex-dir-row utc_flex-jc-center utc_flex-ai-center utc_flex-gap-md">
          <img class="header-img" src="./assets/icons/pokeball.svg" alt="Logo der Bestell-App" />
          <p>Timo"s Pokedex</p>
        </div>
        <div class="utc_flex-dir-row utc_flex-jc-center utc_flex-ai-center utc_flex-gap-md">
          <input type="text" />
          <button class="btn search-button"></button>
        </div>
      </section>
    </header>
    <main class="complete_main">
      <section class="section-content-wrapper utc_flex-dir-col utc_flex-jc-sbetween utc_flex-ai-center">
        <img src="./assets/img/pokefont-curved.png" alt="" />
        <p>A Pokedex Application created with the help of https://pokeapi.co/</p>
      </section>
      <section class="section-content-wrapper">
        <div id="pokemon-list-container" class="poke-grid-container">
          <article class="poke-list-item">
            <section class="header__poke-list-item">
              <h3 id="pokeName">Name</h3>
              <h3 id="pokeID">#ID</h3>
            </section>
            <section class="main__poke-list-item">
              <img id="pokeBigPicture" class="poke-item-picture" src="" alt="" />
              <div id="pokeCategorieContainer" class="poke-item-categories">
                <img class="categorie-badge" src="" alt="" />
                <img class="categorie-badge" src="" alt="" />
              </div>
            </section>
          </article>
        </div>
      </section>
      <button id="btnLoadMore" onclick="loadMorePokemon()">Load More</button>
      <dialog>
        <article class="poke-dialog">
          <section class="header__poke-dialog">
            <h2>Name</h2>
            <h2>#ID</h2>
          </section>
          <section class="main__poke-dialog">
            <img class="poke-picture" src="" alt="" />
            <div class="poke-categories">
              <img class="categorie-badge" src="" alt="" />
              <img class="categorie-badge" src="" alt="" />
            </div>
            <div class="poke-meta">
              <div class="poke-meta-nav">
                <button>Main</button><button>Stats</button><button>Evo Chain</button>
                <div id="meta-main">
                  <table class="poke-stats-table">
                    <tbody>
                      <tr>
                        <th scope="row">Height</th>
                        <td>: 2 m</td>
                      </tr>
                      <tr>
                        <th scope="row">Weight</th>
                        <td>: 100 kg</td>
                      </tr>
                      <tr>
                        <th scope="row">Base experience</th>
                        <td>: 263</td>
                      </tr>
                      <tr>
                        <th scope="row">Abilities</th>
                        <td>: overgrow, chlorophyll</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <div id="meta-stats"></div>
                <div id="meta-evo-chain"></div>
              </div>
            </div>
          </section>
        </article>
      </dialog>
    </main>
    <footer class="complete_footer">
      <section class="section-content-wrapper utc_flex-dir-row utc_flex-ai-center">
        <p>© 2026 Timo Böning</p>
      </section>
    </footer>
  </body>
</html>
