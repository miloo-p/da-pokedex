<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokeindex</title>

    <link rel="shortcut icon" href="./assets/icons/pokeball.svg" type="image/x-icon" />

    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/fonts.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/list.css" />
    <link rel="stylesheet" href="./css/detail.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
    <link rel="stylesheet" href="./css/loading-screen.css" />

    <script src="./js/template.js" defer></script>
    <script src="./js/main.js" defer></script>
  </head>
  <body onload="init()">
    <header class="complete_header">
      <section class="section-content-wrapper utc_flex-dir-row utc_flex-jc-sbetween utc_flex-ai-center">
        <div class="utc_flex-dir-row utc_flex-jc-center utc_flex-ai-center utc_flex-gap-md">
          <img class="header-img" src="./assets/icons/pokeball.svg" alt="Logo der Bestell-App" />
          <p>Timo"s Pokedex</p>
        </div>
        <div class="utc_flex-dir-row utc_flex-jc-center utc_flex-ai-center utc_flex-gap-md">
          <input
            id="searchInput"
            class="search-input"
            type="text"
            placeholder="Pokémon suchen..."
            onkeyup="filterPokemon()"
          />
        </div>
      </section>
    </header>
    <main class="complete_main">
      <div
        id="loading-spinner"
        class="loading-overlay utc_flex-dir-row utc_flex-jc-center utc_flex-ai-center d_none"
      >
        <div class="loading-wrapper utc_flex-dir-col utc_flex-jc-center utc_flex-ai-center">
          <img class="loading-center" src="./assets/img/loading-animation/pikatchu.svg" alt="Pikatchu" />
          <img
            class="loading-thunder thunder-last thunder-position-top"
            src="./assets/img/loading-animation/1-thunder.svg"
            alt="Thunder-Animation"
          />
          <img
            class="loading-thunder thunder-early thunder-position-2"
            src="./assets/img/loading-animation/2-thunder.svg"
            alt="Thunder-Animation"
          />
          <img
            class="loading-thunder thunder-late thunder-position-3"
            src="./assets/img/loading-animation/3-thunder.svg"
            alt="Thunder-Animation"
          />
          <img
            class="loading-thunder thunder-late thunder-position-4"
            src="./assets/img/loading-animation/4-thunder.svg"
            alt="Thunder-Animation"
          />
          <img
            class="loading-thunder thunder-late thunder-position-5"
            src="./assets/img/loading-animation/5-thunder.svg"
            alt="Thunder-Animation"
          />
          <img
            class="loading-thunder thunder-early thunder-position-6"
            src="./assets/img/loading-animation/6-thunder.svg"
            alt="Thunder-Animation"
          />
          <div id="progressContainer">
            <div id="progressBar"></div>
          </div>
        </div>
      </div>
      <section class="section-content-wrapper utc_flex-dir-col utc_flex-jc-sbetween utc_flex-ai-center">
        <div class="hero-picture-wrapper">
          <img class="hero-part hero-grass" src="./assets/img/hero/pokedex-back.png" alt="" />
          <img class="hero-part hero-typo" src="./assets/img/hero/pokedex-typo.png" alt="" />

          <div class="hero-pokeball-position">
            <img class="hero-pokeball" src="./assets/img/hero/pokedex-ball.png" alt="" />
          </div>

          <img class="hero-part hero-grass" src="./assets/img/hero/pokedex-left.png" alt="" />
          <img class="hero-part hero-grass" src="./assets/img/hero/pokedex-right.png" alt="" />
        </div>

        <p>A Pokedex Application created with the help of https://pokeapi.co/</p>
      </section>
      <section class="section-content-wrapper">
        <div id="pokemon-list-container" class="poke-grid-container"></div>
      </section>
      <div class="section-content-wrapper bottom-nav utc_flex-dir-row utc_flex-jc-center utc_flex-ai-center">
        <button id="btnLoadMore" class="load-more-btn" onclick="loadMorePokemon()">Load More</button>
      </div>
      <dialog id="pokeDialoge" onclick="closeDialog()"></dialog>
    </main>
    <footer class="complete_footer">
      <section class="section-content-wrapper utc_flex-dir-row utc_flex-ai-center">
        <p>© 2026 Timo Böning</p>
      </section>
    </footer>
  </body>
</html>
